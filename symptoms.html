<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Symptoms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🩺 Select Your Symptoms</h1>

        <label for="name">Patient Name:</label>
        <input type="text" id="name" placeholder="Enter patient's name">

        <label for="age">Age:</label>
        <input type="number" id="age" placeholder="Enter age">

        <label for="gender">Gender:</label>
        <select id="gender">
            <option value="">--Select--</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>

        <label for="who">Who is answering?</label>
        <select id="who">
            <option value="">--Select--</option>
            <option value="patient">Patient</option>
            <option value="relative">Relative</option>
        </select>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" placeholder="Enter phone number">

        <label for="diseases">Diseases Suffering From:</label>
        <input type="text" id="diseases" placeholder="Enter existing diseases">

        <label>Body Part:</label>
        <select id="bodyPart" onchange="updateSymptoms()">
            <option value="">--Select--</option>
            <option value="head">Head</option>
            <option value="stomach">Stomach</option>
            <option value="chest">Chest</option>
            <option value="skin">Skin</option>
            <option value="mental">Mental</option>
            <option value="kidney">Kidney</option>
            <option value="joints">Joints</option>
            <option value="body">Body</option>
            <option value="menstrual">Menstrual Problems</option>
        </select>

        <label>Detailed Symptoms:</label>
        <select id="detailedSymptom">
            <option value="">--Select a Body Part First--</option>
        </select>

        <button onclick="findRemedy()">Find Remedy</button>
    </div>

    <p id="remedyResult"></p>

    <script src="script.js"></script>
</body>
</html>
